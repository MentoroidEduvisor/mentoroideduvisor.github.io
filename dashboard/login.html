<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoroid Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Poppins',sans-serif;
  background:#ffe6dc;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Login Card */
.login-box{
  background:linear-gradient(135deg,#111827,#1f2937);
  padding:40px;
  border-radius:25px;
  width:380px;
  text-align:center;
  color:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.login-box h2{
  font-weight:800;
  margin-bottom:25px;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  font-size:14px;
  font-family:'Poppins',sans-serif;
}

/* Buttons */
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:40px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
  font-family:'Poppins',sans-serif;
}

.email-btn{
  background:#ff7a5a;
  color:white;
}

.email-btn:hover{
  background:#ff5e3a;
  transform:translateY(-2px);
}

.google-btn{
  background:white;
  color:#ff7a5a;
}

.google-btn:hover{
  background:#f5f5f5;
  transform:translateY(-2px);
}

#message{
  margin-top:12px;
  font-size:14px;
  color:#ffb4a2;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Mentoroid Access</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="email-btn" onclick="emailLogin()">Login with Email</button>
  <button class="google-btn" onclick="googleLogin()">Login with Google</button>

  <div id="message"></div>
</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* YOUR REAL FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAic5ksoDaHkN3aGZ3DvAqvPbECep5h1AM",
  authDomain: "mentoroid-brain.firebaseapp.com",
  projectId: "mentoroid-brain",
  storageBucket: "mentoroid-brain.firebasestorage.app",
  messagingSenderId: "1094210852482",
  appId: "1:1094210852482:web:811b705bf0ad7105de069b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* READ REDIRECT PARAMETER */
const urlParams = new URLSearchParams(window.location.search);
const redirectPage = urlParams.get("redirect");

/* EMAIL LOGIN */
window.emailLogin = function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{

    if (redirectPage) {
      window.location.href = redirectPage;
    } else {
      window.location.href = "../home.html";
    }

  })
  .catch(()=>{
    document.getElementById("message").innerText = "Invalid Email or Password";
  });

};

/* GOOGLE LOGIN */
window.googleLogin = function(){

  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
  .then(()=>{

    if (redirectPage) {
      window.location.href = redirectPage;
    } else {
      window.location.href = "../home.html";
    }

  })
  .catch(error=>{
    document.getElementById("message").innerText = error.message;
  });

};

</script>

</body>
</html>
