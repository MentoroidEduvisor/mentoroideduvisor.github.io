<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoroid Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#111827,#1f2937);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card */
.login-box{
  background:#ffe6dc;
  padding:40px;
  border-radius:25px;
  width:350px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  animation:fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

h2{
  margin-bottom:25px;
  color:#111827;
  font-weight:800;
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

/* Buttons */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:40px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.email-btn{
  background:#ff7a5a;
  color:white;
}

.email-btn:hover{
  background:#ff5e3a;
  transform:translateY(-2px);
}

.google-btn{
  background:#4285F4;
  color:white;
}

.google-btn:hover{
  transform:translateY(-2px);
  opacity:0.9;
}

#message{
  margin-top:10px;
  font-size:14px;
  color:red;
}

</style>
</head>

<body>

<div class="login-box">
  <h2>Mentoroid Access</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="email-btn" onclick="emailLogin()">Login with Email</button>
  <button class="google-btn" onclick="googleLogin()">Login with Google</button>

  <div id="message"></div>
</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { 
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAic5ksoDaHkN3aGZ3DvAqvPbECep5h1AM",
  authDomain: "mentoroid-brain.firebaseapp.com",
  projectId: "mentoroid-brain",
  storageBucket: "mentoroid-brain.firebasestorage.app",
  messagingSenderId: "1094210852482",
  appId: "1:1094210852482:web:811b705bf0ad7105de069b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.emailLogin = function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    window.location.href="student.html";
  })
  .catch(error=>{
    document.getElementById("message").innerText=error.message;
  });

};

window.googleLogin = function(){

  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
  .then(()=>{
    window.location.href="student.html";
  })
  .catch(error=>{
    document.getElementById("message").innerText=error.message;
  });

};

</script>

</body>
</html>
