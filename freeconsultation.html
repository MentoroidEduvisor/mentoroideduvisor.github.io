[6:08 am, 2/3/2026] Akshay  Tomar: <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Free Consultation Call - Mentoroid</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* ✅ YOUR REAL FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAic5ksoDaHkN3aGZ3DvAqvPbECep5h1AM",
  authDomain: "mentoroid-brain.firebaseapp.com",
  projectId: "mentoroid-brain",
  storageBucket: "mentoroid-brain.firebasestorage.app",
  messagingSenderId: "1094210852482",
  appId: "1:1094210852482:web:811b705bf0ad7105de069b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Submit Function */
window.submitForm = async function(event){
  event.preventDefault();

  const button = document.getElementById("submitBtn");
  button.disabled = true;
  button.innerText = "Submitting...";

  try {
    await addDoc(collection(db, "consultationcall"), {
      fullName: document.getElementById("fullname").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      city: document.getElementById("city").value,
      state: document.getElementById("state").value,
      age: document.getElementById("age").value,
      source: document.getElementById("source").value,
      knowledgeLevel: document.getElementById("knowledge").value,
      purpose: document.getElementById("purpose").value,
      preferredDate: document.getElementById("date").value,
      timeSlot: document.getElementById("timeslot").value,
      createdAt: serverTimestamp()
    });

    alert("Consultation Call Booked Successfully!");
    document.getElementById("consultForm").reset();

  } catch (error) {
    console.error("Firebase Error:", error);
    alert("Error submitting form. Check console.");
  }

  button.disabled = false;
  button.innerText = "Submit";
};
</script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;

}

}

<body>

<div class="container">

<h2>BOOK FREE CONSULTATION CALL</h2>
<p class="subtext">Schedule your consultation with Mentoroid Team</p>

<form id="consultForm" onsubmit="submitForm(event)">

<label>Full Name</label>
<input type="text" id="fullname" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Mobile Number</label>

<select id="source" required>
<option value="">Select Option</option>

<option>Google/Search</option>
</select>

<label>Your Knowledge Level in Digital Marketing & AI</label>
<select id="knowledge" required>
<option value="">Select Level</option>
<option>Beginner</option>
<option>Intermediate</option>
<option>Advanced</option>
</select>

<label>What Brings You Here?</label>
<select id="purpose" required>
<option value="">Select Reason</option>
<option>Career Guidance</option>
<option>Skill Learning</option>
<option>Earning Opportunity</option>
<option>Business Growth</option>
</select>

<label>Choose Preferred Date</label>
<input type="date" id="date" required>

<label>Choose Time Slot</label>
<select id="timeslot" required>
<option value="">Select Slot</option>
<option>9AM - 11AM</option>
<option>12PM - 2PM</option>
<option>3PM - 5PM</option>
<option>6PM - 7PM</option>
</select>

<button type="submit" id="submitBtn">Submit</button>

</form>

</div>

</body>
